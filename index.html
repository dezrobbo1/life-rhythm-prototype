  <title>Life Rhythm Prototype 1.4.3</title>
  <style>
    :root{--bg:#f7f2e8;--card:#fffdf8;--white:#fff;--ink:#1f2933;--muted:#667085;--line:#d9cdbb;--soft:#efe5d7;--accent:#3f7471;--accent2:#285653;--orange:#d97a43;--good:#4e7a58;--warn:#8a6424;--danger:#8a2d35;--blue:#456b80;--blueBg:#ddeef7;--greenBg:#e5f3e8;--amberBg:#fff3d6;--redBg:#f8d7da;--shadow:0 10px 28px rgba(31,41,51,.08)}
    *{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;line-height:1.35;-webkit-font-smoothing:antialiased}body{padding:env(safe-area-inset-top) 0 calc(86px + env(safe-area-inset-bottom))}button,input,select,textarea{font:inherit}button{cursor:pointer;touch-action:manipulation}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);padding:10px 11px}label{display:block;font-size:12px;font-weight:800;color:#475467;margin:8px 0 4px}textarea{min-height:74px;resize:vertical}.wrap{max-width:860px;margin:0 auto;padding:12px}.top{position:sticky;top:0;z-index:20;margin:-12px -12px 10px;padding:12px;background:rgba(247,242,232,.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(217,205,187,.7)}.brand{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}.logoTitle{display:flex;align-items:center;gap:10px}.logo{width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#8aa29d);display:grid;place-items:center;color:#fff;font-weight:900}.h1{font-size:18px;font-weight:900;letter-spacing:-.02em}.sub,.hint{font-size:12px;color:var(--muted)}.clock{text-align:right;font-size:12px;color:var(--muted)}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:14px;margin:10px 0;box-shadow:var(--shadow)}.card.white{background:#fff}.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}.split{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}h2{font-size:19px;line-height:1.15;margin:0 0 8px;letter-spacing:-.025em}h3{font-size:15px;margin:0 0 6px}.btn{border:1px solid var(--line);background:#fff;border-radius:999px;min-height:40px;padding:9px 12px;font-weight:850;color:var(--ink)}.btn.primary{border-color:var(--accent);background:var(--accent);color:#fff}.btn.dark{border-color:var(--accent2);background:var(--accent2);color:#fff}.btn.good{background:var(--greenBg);border-color:#bddbc5;color:var(--good)}.btn.warn{background:var(--amberBg);border-color:#eccb9f;color:var(--warn)}.btn.danger{background:var(--redBg);border-color:#efc2ba;color:var(--danger)}.btn.small{min-height:32px;padding:7px 10px;font-size:12px}.btn.block{width:100%}.pill{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);background:#fffaf1;border-radius:999px;padding:5px 8px;font-size:11px;font-weight:800;color:var(--muted)}.pill.good{background:var(--greenBg);color:var(--good);border-color:#bddbc5}.pill.warn{background:var(--amberBg);color:var(--warn);border-color:#eccb9f}.pill.blue{background:var(--blueBg);color:var(--blue);border-color:#c4d7dd}.pill.danger{background:var(--redBg);color:var(--danger);border-color:#efc2ba}.stateGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.stateBtn{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:4px;min-height:72px;border:1px solid var(--line);background:#fff;border-radius:18px;padding:11px;text-align:left}.stateBtn strong{display:block;font-size:16px;line-height:1.15}.stateBtn span{display:block;font-size:12px;line-height:1.3;color:var(--muted)}.stateBtn.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(63,116,113,.15)}.task{background:#fff;border:1px solid var(--line);border-radius:20px;padding:12px;margin:9px 0}.task.done{background:var(--greenBg);opacity:.72}.task.shrunk{background:#fffaf2;border-color:#eccb9f}.taskTop{display:flex;justify-content:space-between;gap:10px}.taskTitle{font-weight:900}.meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}.taskActions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;margin-top:10px}.taskActions.two{grid-template-columns:repeat(2,minmax(0,1fr))}.details summary{list-style:none;display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:850;background:#fff}.details summary::-webkit-details-marker{display:none}.more{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}.timer{border-left:5px solid var(--accent);background:#fff;border-radius:20px}.elapsed{font-size:24px;font-weight:950;font-variant-numeric:tabular-nums}.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(247,242,232,.97);border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}.navInner{max-width:860px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.navBtn{border:0;background:transparent;border-radius:14px;padding:8px 4px;font-size:11px;font-weight:850;color:var(--muted)}.navBtn.active{background:#fff;color:var(--accent);box-shadow:var(--shadow)}.screen{display:none}.screen.active{display:block}.empty{border:1px dashed var(--line);border-radius:18px;padding:14px;color:var(--muted);background:rgba(255,255,255,.52)}.modalBack{display:none;position:fixed;inset:0;z-index:50;background:rgba(31,41,51,.34);align-items:flex-end}.modalBack.show{display:flex}.modal{width:min(860px,100%);max-height:92vh;overflow:auto;background:var(--card);border-radius:24px 24px 0 0;padding:16px;box-shadow:0 -20px 45px rgba(0,0,0,.18)}.toast{position:fixed;z-index:80;left:50%;bottom:94px;transform:translateX(-50%) translateY(18px);background:#1f2933;color:#fff;border-radius:999px;padding:10px 14px;opacity:0;transition:.18s;font-size:13px;font-weight:850;max-width:92%;text-align:center}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.insight{border:1px solid var(--line);background:#fff;border-radius:16px;padding:10px;margin:7px 0}.safeBox{border:1px solid var(--line);background:#fffaf1;border-radius:18px;padding:12px}.version{font-size:11px;color:var(--muted);text-align:center;margin:18px 0}.check{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);border-radius:999px;background:#fff;padding:8px 10px;font-size:12px;font-weight:800}.check input{width:auto}.boostOpt{border:1px solid var(--line);border-radius:18px;background:#fff;padding:11px;text-align:left}.boostOpt.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(63,116,113,.15)}.form2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.hidden{display:none!important}@media(max-width:560px){.wrap{padding:10px}.top{margin:-10px -10px 10px;padding:10px}.grid,.grid3,.form2{grid-template-columns:1fr}.stateGrid{grid-template-columns:1fr}.taskActions{grid-template-columns:1fr}.brand{align-items:center}.clock{display:none}.card{border-radius:20px}.btn{min-height:42px}.navBtn{font-size:10px}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
(() => {
  'use strict';
  const VERSION = '1.4.3';
  const KEY = 'lifeRhythm_v143';
  const OLD_KEYS = ['lifeRhythm_v140','lifeRhythmPrototype13','lifeRhythm_v136','lifeRhythm_v135'];
  const $ = id => document.getElementById(id);
  const todayISO = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
  const uid = () => `t_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmtMins = m => { m = Math.max(0, Math.round(Number(m)||0)); return m >= 60 ? `${Math.floor(m/60)}h${m%60 ? ` ${m%60}m` : ''}` : `${m}m`; };
  const mins = t => { if(!t) return null; const p = String(t).split(':').map(Number); return Number.isFinite(p[0]) ? p[0]*60 + (p[1]||0) : null; };
  const timeFrom = m => `${String(Math.floor(((m%1440)+1440)%1440/60)).padStart(2,'0')}:${String(((m%1440)+1440)%1440%60).padStart(2,'0')}`;
  const nowMins = () => new Date().getHours()*60 + new Date().getMinutes();
  const todayName = () => ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];

  const areas = ['Sleep','Food','Movement','Work','House','Money','Anti-scroll','Emotion','Sensory','Social','Family','Admin'];
  const blocks = ['Morning','Midday','Afternoon','Evening','Shutdown'];
  const priorityLabels = {must:'Must',should:'Should',helpful:'Helpful',optional:'Optional'};
  const stateList = [
    ['normal','Normal day','Top 3 only. Keep the rhythm visible.'],
    ['behind','Behind / missed things','Shrink, move, or restart. No catch-up pile.'],
    ['low','Low energy','Minimum versions count. Choose lower friction.'],
    ['overload','Overstimulated','Reduce load before adding output.'],
    ['avoid','Avoiding something','Find one first physical step.'],
    ['restart','Need restart','One useful action is enough to re-enter.']
  ];
  const defaults = {
    version: VERSION, date: todayISO(), screen: 'today', state: 'normal', done: {}, parked: [], moved: [], shrunk: [], touched: {}, resetLog: [], tasks: [], activeTimer: null, boostFeedback: null, timeSessions: [], startBoostLog: [],
    settings: { wake:'06:30', bed:'21:30', breakfast:'07:00', lunch:'12:00', dinner:'18:00', workStart:'08:00', workEnd:'16:30', workDays:['Monday','Tuesday','Wednesday','Thursday','Friday'], exerciseTarget:3, mobilityTarget:4, avoidFoodRewards:true, avoidShoppingRewards:true, avoidScrollingRewards:true, avoidUrgencyCountdowns:false, avoidAccountabilityPrompts:false, avoidStreakPressure:true }
  };

  let app = load();
  let tick = null;
  let wired = false;

  function starterTasks(){ return [
    task('Eat breakfast','Food','Morning','should','flexible',5,15,25,'fallback','Eat something easy now','lowEnergy'),
    task('Plan dinner','Food','Afternoon','should','flexible',3,10,20,'fallback','Choose dinner or backup meal','unclear'),
    task('Emergency food backup','Food','Evening','helpful','flexible',3,10,20,'keep','Choose one easy backup meal','unclear'),
    task('First work focus block','Work','Morning','should','flexible',3,25,40,'keep','Open the work list and choose one first task','unclear'),
    task('Work shutdown','Work','Shutdown','should','flexible',2,10,20,'keep','Write the next work step','unclear'),
    task('Gym / exercise','Movement','Evening','helpful','flexible',10,45,60,'move','10-minute walk or stretch','lowEnergy'),
    task('Stretch / mobility','Movement','Shutdown','helpful','flexible',2,10,20,'fallback','2-minute stretch now','lowEnergy'),
    task('Kitchen reset','House','Evening','helpful','flexible',5,20,35,'ask','Clear one bench','tooBig'),
    task('Anti-scroll pause','Anti-scroll','Anytime','helpful','flexible',2,5,10,'keep','Put phone down for two minutes','phonePull'),
    task('Spending pause','Money','Anytime','helpful','flexible',2,5,15,'keep','Wait 10 minutes before buying','emotional'),
    task('Emotional recovery reset','Emotion','Anytime','helpful','flexible',2,5,15,'keep','Name the next kind step','emotional'),
    task('Leave for appointment','Family','Fixed time','must','must',0,30,30,'keep','Check keys, wallet, phone and leave','timeShort')
  ]; }
  function task(title, area, window, priority, completionType, min, normal, full, late, fallback, barrier){ return {id:uid(), title, area, window, priority, completionType, min, normal, full, late, fallback, barrier, fixedTime:'', notes:'', created:todayISO()}; }
  const packs = [
    ['Workday basics',['Eat breakfast','First work focus block','Plan dinner','Work shutdown','Anti-scroll pause']],
    ['Low-energy day',['Eat breakfast','Stretch / mobility','Plan dinner','Emotional recovery reset','Anti-scroll pause']],
    ['Food rhythm',['Eat breakfast','Plan dinner','Emergency food backup']],
    ['Movement week',['Gym / exercise','Stretch / mobility']],
    ['House reset',['Kitchen reset','Laundry start','Clear one surface']],
    ['Reset evening',['Plan dinner','Kitchen reset','Work shutdown','Emotional recovery reset']]
  ];

  function load(){
    let raw = localStorage.getItem(KEY);
    if(!raw){ for(const k of OLD_KEYS){ raw = localStorage.getItem(k); if(raw) break; } }
    try { return migrate(raw ? JSON.parse(raw) : {...defaults, tasks: starterTasks()}); }
    catch { return migrate({...defaults, tasks: starterTasks()}); }
  }
  function migrate(s){
    const out = {...defaults, ...s, version: VERSION, settings:{...defaults.settings, ...(s.settings||{})}};
    out.done = out.done || {}; out.parked = Array.isArray(out.parked) ? out.parked : [];
    out.moved = Array.isArray(out.moved) ? out.moved : []; out.shrunk = Array.isArray(out.shrunk) ? out.shrunk : [];
    out.resetLog = Array.isArray(out.resetLog) ? out.resetLog : []; out.timeSessions = Array.isArray(out.timeSessions) ? out.timeSessions : []; out.startBoostLog = Array.isArray(out.startBoostLog) ? out.startBoostLog : [];
    out.tasks = Array.isArray(out.tasks) && out.tasks.length ? out.tasks.map(t => ({ id:t.id||uid(), title:t.title||t.name||'Untitled task', area:t.area||'Admin', window:t.window||t.bestTime||'Anytime', priority:t.priority||'helpful', completionType:t.completionType||'flexible', min:Number(t.min ?? t.minMins ?? 5), normal:Number(t.normal ?? t.normalMins ?? t.estimate ?? 15), full:Number(t.full ?? t.fullMins ?? 30), late:t.late||t.lateHandling||'ask', fallback:t.fallback||'', barrier:t.barrier||t.startBarrier||'unclear', fixedTime:t.fixedTime||'', notes:t.notes||'', created:t.created||todayISO() })) : starterTasks();
    if(out.date !== todayISO()) { out.date = todayISO(); out.parked = []; out.moved = []; out.shrunk = []; out.touched = {}; out.resetLog.unshift({date:todayISO(), text:'New day opened. Today-only state cleared.'}); }
    return out;
  }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(app)); }catch(e){} }
  function toast(msg){ const el=$('toast'); if(!el) return; el.textContent=msg; el.classList.add('show'); clearTimeout(toast.t); toast.t=setTimeout(()=>el.classList.remove('show'),2400); }

  function blockWindows(){ const s=app.settings; const w=mins(s.wake)||390, l=mins(s.lunch)||720, d=mins(s.dinner)||1080, b=mins(s.bed)||1290; return {Morning:[w,Math.max(w+120,l)], Midday:[l,Math.max(l+90,900)], Afternoon:[900,Math.max(960,d)], Evening:[d,Math.max(d+90,b-60)], Shutdown:[Math.max(w,b-60),b]}; }
  function currentBlock(){ const n=nowMins(), bw=blockWindows(); if(n<bw.Morning[1]) return 'Morning'; if(n<bw.Midday[1]) return 'Midday'; if(n<bw.Afternoon[1]) return 'Afternoon'; if(n<bw.Evening[1]) return 'Evening'; return 'Shutdown'; }
  function blockRank(b){ return {Morning:1,Midday:2,Afternoon:3,Evening:4,Shutdown:5,Anytime:6,'Fixed time':7}[b]||6; }
  function isWorkNow(){ const s=app.settings; return s.workDays.includes(todayName()) && nowMins() >= (mins(s.workStart)||480) && nowMins() <= (mins(s.workEnd)||990); }
  function isPast(t){ if(t.fixedTime) return mins(t.fixedTime) !== null && mins(t.fixedTime) < nowMins(); return !['Anytime','Fixed time'].includes(t.window) && blockRank(t.window) < blockRank(currentBlock()); }
  function isDone(id){ return (app.done[app.date]||[]).some(x => typeof x === 'string' ? x === id : x.id === id); }
  function activeTasks(){ return app.tasks.filter(t => !isDone(t.id) && !app.parked.includes(t.id) && !app.moved.includes(t.id) && !(isPast(t) && t.late === 'move')).sort((a,b)=>score(b)-score(a)); }
  function score(t){ let s = {must:100, should:65, helpful:35, optional:10}[t.priority] || 35; if(t.window === currentBlock()) s += 20; if(t.fixedTime && !isPast(t)) s += 12; if(isWorkNow() && t.area === 'Work') s += 18; if(app.state === 'low' && t.min <= 5) s += 10; if(app.state === 'overload' && ['Sensory','Emotion','Anti-scroll'].includes(t.area)) s += 18; if(app.state === 'avoid' && ['unclear','tooBig','emotional'].includes(t.barrier)) s += 12; if(app.state === 'restart' && t.min <= 5) s += 16; if(isPast(t) && t.late === 'fallback') s += 6; if(app.shrunk.includes(t.id)) s += 4; return s; }
  function displayTitle(t){ return isPast(t) && t.late === 'fallback' && t.fallback ? t.fallback : t.title; }
  function planned(t, mode='normal'){ if(mode==='minimum') return Number(t.min || 1); if(mode==='full') return Number(t.full || t.normal || 1); return Number(t.normal || t.min || 1); }
  function areaPill(t){ return pill(t.area); }
  function pill(text, cls=''){ return `<span class="pill ${cls}">${esc(text)}</span>`; }
  function averageActual(id){ const xs=app.timeSessions.filter(x=>x.taskId===id); if(!xs.length) return 0; return xs.reduce((a,x)=>a+Number(x.actualMins||0),0)/xs.length; }
  function lastBoostFor(id){ return app.startBoostLog.find(x=>x.taskId===id); }

  function render(){ rollover(); save(); $('app').innerHTML = layout(); wire(); updateClock(); renderActiveTimer(); if(app.boostFeedback) openBoostFeedback(); if(tick) clearInterval(tick); tick=setInterval(()=>{updateClock(); renderActiveTimer();},1000); }
  function rollover(){ if(app.date !== todayISO()){ app.date=todayISO(); app.parked=[]; app.moved=[]; app.shrunk=[]; app.touched={}; app.resetLog.unshift({date:todayISO(), text:'New day opened. Today-only state cleared.'}); } }
  function layout(){ return `<div class="wrap"><div class="top"><div class="brand"><div class="logoTitle"><div class="logo">LR</div><div><div class="h1">Life Rhythm</div><div class="sub">Prototype ${VERSION} · full phone trial</div></div></div><div class="clock"><div id="clockNow"></div><div id="clockBlock"></div></div></div></div>${screen('today',todayScreen())}${screen('plan',planScreen())}${screen('reset',resetScreen())}${screen('tasks',tasksScreen())}${screen('setup',setupScreen())}<div class="version">Local-first. No accounts. No clinical, therapy, diet, exercise or financial advice.</div></div>${nav()}${taskModal()}${boostModal()}${boostFeedbackModal()}<div id="toast" class="toast"></div>`; }
  function screen(id, inner){ return `<section id="screen-${id}" class="screen ${app.screen===id?'active':''}">${inner}</section>`; }
  function nav(){ return `<nav class="nav"><div class="navInner">${[['today','Today'],['plan','Plan'],['reset','Reset'],['tasks','Tasks'],['setup','Setup']].map(([id,l])=>`<button class="navBtn ${app.screen===id?'active':''}" data-nav="${id}">${l}</button>`).join('')}</div></nav>`; }

  function todayScreen(){ const tasks=activeTasks(); const next=tasks[0]; const state=stateList.find(x=>x[0]===app.state)||stateList[0]; return `<div id="timerSlot"></div><div class="card"><div class="split"><div><h2>Where are you now?</h2><div class="hint">${esc(state[2])}</div></div><span class="pill blue">${currentBlock()}</span></div><div class="stateGrid">${stateList.map(([id,name,hint])=>`<button class="stateBtn ${app.state===id?'active':''}" data-state="${id}"><strong>${name}</strong><span class="hint">${hint}</span></button>`).join('')}</div></div><div class="card white"><div class="split"><div><h2>Next useful action</h2><div class="hint">Start small. Minimum counts.</div></div><button class="btn small warn" data-too-much>Too much today</button></div>${next?taskCard(next,true):emptyStart()}</div><div class="card"><h2>Today’s top 3</h2>${tasks.slice(0,3).map(t=>taskCard(t)).join('')||emptyStart()}</div><div class="card"><h2>Time reality</h2>${timeReality(tasks)}</div><div class="card white"><h2>Daily review</h2>${dailyReview()}</div>`; }
  function emptyStart(){ return `<div class="empty">No active task. Add one task or load a starter rhythm.<div class="row" style="margin-top:10px"><button class="btn primary" data-add-task>Add task</button><button class="btn" data-load-starters>Load starter tasks</button></div></div>`; }
  function taskCard(t){ const done=isDone(t.id), must=t.completionType==='must'||t.priority==='must', avg=averageActual(t.id), boost=lastBoostFor(t.id); const late=isPast(t)?lateText(t):''; const title=displayTitle(t); const actions=must?`<div class="taskActions two"><button class="btn primary" data-start-timer="${t.id}">Start</button><button class="btn good" data-complete="${t.id}" data-mode="done">Done</button></div>`:`<div class="taskActions"><button class="btn good" data-complete="${t.id}" data-mode="minimum">Minimum<br><span class="hint">${fmtMins(t.min)}</span></button><button class="btn good" data-complete="${t.id}" data-mode="normal">Normal<br><span class="hint">${fmtMins(t.normal)}</span></button><button class="btn good" data-complete="${t.id}" data-mode="full">Full<br><span class="hint">${fmtMins(t.full)}</span></button></div>`; return `<div class="task ${done?'done':''} ${app.shrunk.includes(t.id)?'shrunk':''}"><div class="taskTop"><div><div class="taskTitle">${esc(title)}</div><div class="meta">${areaPill(t)}${pill(t.fixedTime?`Fixed ${t.fixedTime}`:t.window,'blue')}${pill(priorityLabels[t.priority]||t.priority,t.priority==='must'?'danger':t.priority==='should'?'warn':'')}${pill(`planned ${fmtMins(planned(t))}`)}${avg?pill(`actual avg ${fmtMins(avg)}`,'good'):''}</div></div></div><div class="hint" style="margin-top:8px">${why(t)}${late?` ${late}`:''}</div><div class="row" style="margin-top:10px"><button class="btn primary" data-start-timer="${t.id}">Start timer</button><button class="btn warn" data-boost="${t.id}">Make easier to start</button><button class="btn" data-not-now="${t.id}">Not now</button></div>${actions}${boost?`<div class="hint" style="margin-top:8px">Last Start Boost: ${esc(boost.label)} · ${esc(resultLabel(boost.result||'pending'))}</div>`:''}<details class="details"><summary>More</summary><div class="more"><button class="btn small" data-shrink="${t.id}">Shrink today</button><button class="btn small" data-edit="${t.id}">Edit</button><button class="btn small danger" data-delete="${t.id}">Delete</button></div></details></div>`; }
  function why(t){ if(t.priority==='must') return 'Protected because it is marked must-do.'; if(t.window===currentBlock()) return `Fits the current ${currentBlock().toLowerCase()} block.`; if(app.shrunk.includes(t.id)) return 'Shrunk for today. Minimum counts.'; if(isPast(t) && t.late==='fallback') return 'The original time window passed, so a fallback is shown.'; return 'Available as a useful next action.'; }

  function timeReality(tasks){ const total=tasks.reduce((a,t)=>a+planned(t),0), must=tasks.filter(t=>t.priority==='must').length; return `<div class="grid3"><div class="insight"><strong>${fmtMins(total)}</strong><div class="hint">active planned time</div></div><div class="insight"><strong>${must}</strong><div class="hint">protected tasks</div></div><div class="insight"><strong>${tasks.length}</strong><div class="hint">active tasks</div></div></div><div class="row"><button class="btn good" data-realistic>Feels realistic</button><button class="btn warn" data-too-much>Slightly too much</button><button class="btn danger" data-way-too-much>Way too much</button></div>`; }
  function dailyReview(){ const done=(app.done[app.date]||[]), parked=app.tasks.filter(t=>app.parked.includes(t.id)), moved=app.tasks.filter(t=>app.moved.includes(t.id)); return `<div class="grid"><div class="insight"><strong>${done.length}</strong><div class="hint">done today</div></div><div class="insight"><strong>${Object.keys(app.touched||{}).length}</strong><div class="hint">life areas touched</div></div></div><div class="hint">Parked: ${parked.map(t=>esc(t.title)).join(', ')||'none'}. Moved: ${moved.map(t=>esc(t.title)).join(', ')||'none'}.</div>`; }

  function planScreen(){ const by={Morning:[],Midday:[],Afternoon:[],Evening:[],Shutdown:[]}; activeTasks().forEach(t=>{ const b = t.fixedTime ? blockFromFixed(t.fixedTime) : (blocks.includes(t.window)?t.window:currentBlock()); by[b].push(t); }); const tomorrow = app.tasks.filter(t=>!isDone(t.id)).slice(0,6); return `<div class="card"><div class="split"><div><h2>Soft plan</h2><div class="hint">Suggested rhythm blocks only. Not a strict calendar.</div></div><button class="btn" data-refresh>Refresh</button></div>${anchorPills()}</div>${blocks.map(b=>`<div class="card white"><div class="split"><div><h2>${b}${currentBlock()===b?' · now':''}</h2><div class="hint">${blockLabel(b)}</div></div><span class="pill ${by[b].length?'good':''}">${by[b].length||'open'}</span></div>${by[b].length?by[b].map(t=>taskCard(t)).join(''):'<div class="empty">No suggested item in this block.</div>'}</div>`).join('')}<div class="card"><h2>Tomorrow preview</h2><div class="hint">Accept, shrink or move. Do not make a catch-up pile.</div>${tomorrow.length?tomorrow.map(t=>`<div class="insight"><strong>${esc(t.title)}</strong><div class="meta">${areaPill(t)}${pill(fmtMins(planned(t)),'blue')}</div></div>`).join(''):'<div class="empty">No obvious items for tomorrow.</div>'}</div>`; }
  function blockFromFixed(t){ const m=mins(t); const bw=blockWindows(); return blocks.find(b=>m < bw[b][1]) || 'Shutdown'; }
  function blockLabel(b){ const w=blockWindows()[b]; return `${timeFrom(w[0])}–${timeFrom(w[1])}`; }
  function anchorPills(){ const s=app.settings; return `<div class="meta">${pill(`Wake ${s.wake}`,'blue')}${pill(`Breakfast ${s.breakfast}`)}${pill(`Work ${s.workStart}-${s.workEnd}`)}${pill(`Lunch ${s.lunch}`)}${pill(`Dinner ${s.dinner}`)}${pill(`Bed ${s.bed}`,'blue')}</div>`; }

  function resetScreen(){ return `<div class="card"><h2>Reset Today</h2><div class="hint">Use this when the plan no longer fits. It shrinks, parks or restarts instead of asking you to catch up.</div><div class="row"><button class="btn primary" data-shrink-active>Shrink active tasks</button><button class="btn" data-move-extras>Move extras</button><button class="btn" data-one-action>Restart with one action</button><button class="btn danger" data-clear-today>Clear today state</button></div></div><div class="card white"><h2>Reset log</h2>${app.resetLog.length?app.resetLog.slice(0,20).map(r=>`<div class="insight"><strong>${esc(r.date)}</strong><div class="hint">${esc(r.text)}</div></div>`).join(''):'<div class="empty">No reset entries yet.</div>'}</div>`; }
  function tasksScreen(){ return `<div class="card"><div class="split"><div><h2>Tasks and library</h2><div class="hint">Create flexible tasks with Minimum / Normal / Full versions, or load standard rhythm packs.</div></div><button class="btn primary" data-add-task>Add task</button></div><div class="row"><button class="btn" data-load-starters>Load starter tasks</button>${packs.map(([name])=>`<button class="btn small" data-pack="${esc(name)}">${esc(name)}</button>`).join('')}</div></div><div class="card white"><h2>All tasks</h2>${app.tasks.length?app.tasks.map(t=>taskCard(t)).join(''):'<div class="empty">No tasks yet.</div>'}</div><div class="card"><h2>Timing and Start Boost insights</h2>${insights()}</div>`; }
  function insights(){ const sessions=app.timeSessions.slice(0,8), boosts=app.startBoostLog.slice(0,8); return `${sessions.length?sessions.map(s=>`<div class="insight"><strong>${esc(s.title)}</strong><div class="meta">${pill(`planned ${fmtMins(s.planned)}`,'blue')}${pill(`actual ${fmtMins(s.actualMins)}`,s.actualMins>s.planned?'warn':'good')}</div></div>`).join(''):'<div class="empty">No timed sessions yet.</div>'}<h3 style="margin-top:12px">Start Boost history</h3>${boosts.length?boosts.map(b=>`<div class="insight"><strong>${esc(b.taskTitle)}</strong><div class="hint">${esc(b.label)} · ${esc(resultLabel(b.result||'pending'))}</div></div>`).join(''):'<div class="empty">No Start Boost feedback yet.</div>'}`; }
  function setupScreen(){ const s=app.settings; return `<div class="card"><h2>Weekly rhythm setup</h2><div class="form2"><div><label>Wake target</label><input id="set-wake" type="time" value="${s.wake}"></div><div><label>Bed target</label><input id="set-bed" type="time" value="${s.bed}"></div><div><label>Breakfast</label><input id="set-breakfast" type="time" value="${s.breakfast}"></div><div><label>Lunch</label><input id="set-lunch" type="time" value="${s.lunch}"></div><div><label>Dinner</label><input id="set-dinner" type="time" value="${s.dinner}"></div><div><label>Work start</label><input id="set-workStart" type="time" value="${s.workStart}"></div><div><label>Work finish</label><input id="set-workEnd" type="time" value="${s.workEnd}"></div><div><label>Exercise target / week</label><input id="set-exerciseTarget" type="number" min="0" value="${s.exerciseTarget}"></div></div><label>Work days</label><div class="row">${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(d=>`<label class="check"><input type="checkbox" data-workday="${d}" ${s.workDays.includes(d)?'checked':''}>${d.slice(0,3)}</label>`).join('')}</div><h3 style="margin-top:12px">Start Boost exclusions</h3><div class="row">${[['avoidFoodRewards','No food rewards'],['avoidShoppingRewards','No shopping rewards'],['avoidScrollingRewards','No scrolling rewards'],['avoidUrgencyCountdowns','Avoid urgency countdowns'],['avoidAccountabilityPrompts','Avoid accountability prompts'],['avoidStreakPressure','Avoid streak pressure']].map(([id,label])=>`<label class="check"><input id="set-${id}" type="checkbox" ${s[id]?'checked':''}>${label}</label>`).join('')}</div><div class="row" style="margin-top:12px"><button class="btn primary" data-save-setup>Save setup</button></div></div><div class="card white"><h2>Storage and backup</h2><div class="hint">Data is stored locally in this browser. Export before clearing Safari data or replacing your phone.</div><div class="row"><button class="btn" data-export>Export JSON</button><button class="btn" data-import>Import JSON</button><input class="hidden" id="importFile" type="file" accept="application/json"></div></div><div class="card"><h2>About</h2><div class="safeBox">Life Rhythm is a non-clinical self-management prototype. It does not diagnose or treat ADHD, provide therapy, prescribe exercise or food, provide financial advice, or manage crisis. It is a local-first rhythm and task-initiation aid for personal testing.</div></div>`; }

  function taskModal(){ return `<div class="modalBack" id="taskModal"><div class="modal"><h2 id="taskModalTitle">Add task</h2><input id="taskId" type="hidden"><div class="form2"><div><label>Title</label><input id="taskTitle" placeholder="e.g. Book dentist"></div><div><label>Life area</label><select id="taskArea">${areas.map(a=>`<option>${a}</option>`).join('')}</select></div><div><label>Window</label><select id="taskWindow">${['Anytime','Morning','Midday','Afternoon','Evening','Shutdown','Fixed time'].map(x=>`<option>${x}</option>`).join('')}</select></div><div><label>Fixed time</label><input id="taskFixed" type="time"></div><div><label>Priority</label><select id="taskPriority"><option value="helpful">Helpful</option><option value="should">Should</option><option value="must">Must</option><option value="optional">Optional</option></select></div><div><label>Completion</label><select id="taskCompletion"><option value="flexible">Flexible: Minimum / Normal / Full</option><option value="must">Must finish</option></select></div><div><label>Minimum minutes</label><input id="taskMin" type="number" min="0" value="5"></div><div><label>Normal minutes</label><input id="taskNormal" type="number" min="1" value="15"></div><div><label>Full minutes</label><input id="taskFull" type="number" min="1" value="30"></div><div><label>If window passed</label><select id="taskLate"><option value="ask">Review later</option><option value="fallback">Use fallback</option><option value="keep">Keep active</option><option value="move">Move out of today</option></select></div><div><label>Start barrier</label><select id="taskBarrier"><option value="unclear">Unclear first step</option><option value="tooBig">Too big</option><option value="boring">Boring</option><option value="lowEnergy">Low energy</option><option value="timeShort">Time too short</option><option value="emotional">Emotionally hard</option><option value="needInfo">Need information</option><option value="phonePull">Pulled to phone</option></select></div></div><label>Fallback or minimum wording</label><input id="taskFallback" placeholder="e.g. Eat something easy now"><label>Notes</label><textarea id="taskNotes" placeholder="Optional"></textarea><div class="row" style="margin-top:12px"><button class="btn primary" data-save-task>Save task</button><button class="btn" data-close-modal>Cancel</button></div></div></div>`; }
  function boostModal(){ return `<div class="modalBack" id="boostModal"><div class="modal"><h2>Make easier to start</h2><div class="hint">Pick one support. This avoids dopamine-reset claims and keeps the next step practical.</div><input id="boostTaskId" type="hidden"><h3 style="margin-top:12px">What is blocking the start?</h3><div class="grid" id="boostBarriers"></div><h3 style="margin-top:12px">Supports</h3><div class="grid" id="boostOptions"></div><div class="safeBox" style="margin-top:12px">Use the support only if it helps. Avoid food, shopping, scrolling, urgency or social pressure if those are risky for you.</div><div class="row" style="margin-top:12px"><button class="btn" data-close-boost>Close</button></div></div></div>`; }
  function boostFeedbackModal(){ return `<div class="modalBack" id="boostFeedback"><div class="modal"><h2>Did that help you start?</h2><div class="hint" id="boostFeedbackText"></div><div class="grid"><button class="boostOpt" data-boost-result="yes"><strong>Yes</strong><div class="hint">Made starting easier</div></button><button class="boostOpt" data-boost-result="bit"><strong>A bit</strong><div class="hint">Somewhat useful</div></button><button class="boostOpt" data-boost-result="no"><strong>No</strong><div class="hint">No real help</div></button><button class="boostOpt" data-boost-result="harder"><strong>Harder</strong><div class="hint">Wrong or distracting</div></button></div><div class="row" style="margin-top:12px"><button class="btn" data-skip-boost-feedback>Skip</button></div></div></div>`; }

  function openTask(id){ const t=id?app.tasks.find(x=>x.id===id):null; $('taskModalTitle').textContent=t?'Edit task':'Add task'; $('taskId').value=t?.id||''; $('taskTitle').value=t?.title||''; $('taskArea').value=t?.area||'Admin'; $('taskWindow').value=t?.window||'Anytime'; $('taskFixed').value=t?.fixedTime||''; $('taskPriority').value=t?.priority||'helpful'; $('taskCompletion').value=t?.completionType||'flexible'; $('taskMin').value=t?.min??5; $('taskNormal').value=t?.normal??15; $('taskFull').value=t?.full??30; $('taskLate').value=t?.late||'ask'; $('taskBarrier').value=t?.barrier||'unclear'; $('taskFallback').value=t?.fallback||''; $('taskNotes').value=t?.notes||''; $('taskModal').classList.add('show'); }
  function collectTask(){ const title=$('taskTitle').value.trim(); if(!title){toast('Task needs a title.'); return null;} return { id:$('taskId').value||uid(), title, area:$('taskArea').value, window:$('taskWindow').value, fixedTime:$('taskFixed').value, priority:$('taskPriority').value, completionType:$('taskCompletion').value, min:Number($('taskMin').value)||0, normal:Number($('taskNormal').value)||15, full:Number($('taskFull').value)||30, late:$('taskLate').value, barrier:$('taskBarrier').value, fallback:$('taskFallback').value.trim(), notes:$('taskNotes').value.trim(), created:todayISO() }; }
  function saveTask(){ const t=collectTask(); if(!t) return; const i=app.tasks.findIndex(x=>x.id===t.id); if(i>=0) app.tasks[i]=t; else app.tasks.unshift(t); $('taskModal').classList.remove('show'); save(); render(); toast('Task saved.'); }
  function completeTask(id,mode){ const t=app.tasks.find(x=>x.id===id); if(!t) return; app.done[app.date]=app.done[app.date]||[]; if(!isDone(id)) app.done[app.date].push({id, mode, title:displayTitle(t), area:t.area, date:app.date}); app.touched[t.area]=true; if(app.activeTimer && app.activeTimer.taskId===id){ const actual=Math.max(1,Math.round(timerElapsedMs()/60000)); const plan=planned(t,mode); app.timeSessions.unshift({taskId:id,title:displayTitle(t),planned:plan,actualMins:actual,date:todayISO(),endedAt:new Date().toISOString()}); if(app.activeTimer.boost) app.boostFeedback={...app.activeTimer.boost, taskId:id, taskTitle:displayTitle(t)}; app.activeTimer=null; } save(); render(); toast(`${mode==='done'?'Task':mode} completed. Minimum counts where it fits.`); }
  function notNow(id){ if(!app.parked.includes(id)) app.parked.push(id); app.resetLog.unshift({date:todayISO(),text:`Parked: ${app.tasks.find(t=>t.id===id)?.title||'task'}`}); save(); render(); toast('Parked for review.'); }
  function shrink(id){ if(!app.shrunk.includes(id)) app.shrunk.push(id); save(); render(); toast('Shrunk for today.'); }
  function moveExtras(){ const ids=activeTasks().slice(3).filter(t=>t.priority!=='must').map(t=>t.id); app.moved=[...new Set([...app.moved,...ids])]; app.resetLog.unshift({date:todayISO(),text:`Moved ${ids.length} extra task(s) out of today.`}); save(); render(); toast(ids.length?'Extras moved.':'No extras to move.'); }
  function oneAction(){ const one=activeTasks()[0]; app.moved=activeTasks().filter(t=>!one||t.id!==one.id).filter(t=>t.priority!=='must').map(t=>t.id); if(one&&!app.shrunk.includes(one.id)) app.shrunk.push(one.id); app.resetLog.unshift({date:todayISO(),text:one?`Restarted with one action: ${one.title}.`:'Restart chosen; no active task available.'}); save(); render(); toast('Restart set to one action.'); }
  function clearToday(){ app.done[app.date]=[]; app.parked=[]; app.moved=[]; app.shrunk=[]; app.touched={}; app.activeTimer=null; app.resetLog.unshift({date:todayISO(),text:'Today-only state cleared manually.'}); save(); render(); toast('Today cleared.'); }
  function tooMuch(level='medium'){ activeTasks().forEach((t,i)=>{ if(t.priority==='must') return; if(level==='high' || i>0) { if(!app.moved.includes(t.id)) app.moved.push(t.id); } else if(!app.shrunk.includes(t.id)) app.shrunk.push(t.id); }); app.resetLog.unshift({date:todayISO(),text:level==='high'?'Plan was way too much: moved non-must tasks.':'Plan reduced: shrunk/moved active tasks.'}); save(); render(); toast('Plan reduced.'); }
  function loadStarters(){ starterTasks().forEach(t=>app.tasks.push(t)); save(); render(); toast('Starter tasks loaded.'); }
  function addPack(name){ const pack=packs.find(p=>p[0]===name); if(!pack) return; const list=starterTasks(); let n=0; pack[1].forEach(title=>{ const x=list.find(t=>t.title===title) || task(title,'Admin','Anytime','helpful','flexible',3,10,20,'ask','', 'unclear'); app.tasks.unshift({...x,id:uid()}); n++; }); save(); render(); toast(`${name}: ${n} task(s) added.`); }

  function startTimer(id){ const t=app.tasks.find(x=>x.id===id); if(!t) return; if(app.activeTimer && app.activeTimer.taskId!==id && !confirm('A different timer is running. Switch to this task?')) return; app.activeTimer={taskId:id, startedAt:Date.now(), elapsedMs:0, paused:false, boost:null}; save(); render(); toast('Timer started.'); }
  function timerElapsedMs(){ const tm=app.activeTimer; if(!tm) return 0; return Number(tm.elapsedMs||0)+(tm.paused?0:Date.now()-Number(tm.startedAt||Date.now())); }
  function fmtElapsed(ms){ const s=Math.floor(ms/1000), m=Math.floor(s/60), sec=s%60, h=Math.floor(m/60); return h?`${h}h ${String(m%60).padStart(2,'0')}m`:`${m}:${String(sec).padStart(2,'0')}`; }
  function renderActiveTimer(){ const slot=$('timerSlot'); if(!slot) return; const tm=app.activeTimer; if(!tm){ slot.innerHTML=''; return; } const t=app.tasks.find(x=>x.id===tm.taskId); if(!t){ app.activeTimer=null; save(); slot.innerHTML=''; return; } slot.innerHTML=`<div class="card timer"><div class="split"><div><h2>Timing: ${esc(displayTitle(t))}</h2><div class="hint">Planned ${fmtMins(planned(t))}. Calibration, not a score.</div></div><div class="elapsed">${fmtElapsed(timerElapsedMs())}</div></div><div class="row"><button class="btn warn" data-pause-timer>${tm.paused?'Resume':'Pause'}</button><button class="btn" data-cancel-timer>Cancel</button><button class="btn good" data-finish-timer="${t.id}" data-mode="minimum">Finish minimum</button><button class="btn good" data-finish-timer="${t.id}" data-mode="normal">Finish normal</button></div></div>`; }
  function pauseTimer(){ if(!app.activeTimer) return; if(app.activeTimer.paused){ app.activeTimer.paused=false; app.activeTimer.startedAt=Date.now(); } else { app.activeTimer.elapsedMs=timerElapsedMs(); app.activeTimer.paused=true; } save(); renderActiveTimer(); }
  function cancelTimer(){ app.activeTimer=null; save(); render(); toast('Timer cancelled.'); }

  const barrierLabels={tooBig:'Too big',unclear:'Unclear first step',boring:'Boring',lowEnergy:'Low energy',timeShort:'Time too short',emotional:'Emotionally hard',needInfo:'Need information',phonePull:'Pulled to phone'};
  function openBoost(id){ const t=app.tasks.find(x=>x.id===id); if(!t) return; $('boostTaskId').value=id; const b=t.barrier||'unclear'; renderBoost(b); $('boostModal').classList.add('show'); }
  function renderBoost(selected){ const barriers=Object.entries(barrierLabels); $('boostBarriers').innerHTML=barriers.map(([id,label])=>`<button class="boostOpt ${id===selected?'active':''}" data-boost-barrier="${id}"><strong>${label}</strong><div class="hint">${boostHint(id)}</div></button>`).join(''); const id=$('boostTaskId').value; const t=app.tasks.find(x=>x.id===id); const opts=boostOptions(t,selected); $('boostOptions').innerHTML=opts.map(o=>`<button class="boostOpt" data-boost-option="${o.id}" data-boost-label="${esc(o.label)}"><strong>${esc(o.label)}</strong><div class="hint">${esc(o.note)}</div></button>`).join(''); }
  function boostHint(id){ return {tooBig:'Shrink before pushing.',unclear:'Clarify the first visible action.',boring:'Add interest without distraction.',lowEnergy:'Lower the entry cost.',timeShort:'Start smaller, not faster.',emotional:'Reduce exposure and pressure.',needInfo:'Find one missing piece.',phonePull:'Reduce competing phone cues.'}[id]||''; }
  function boostOptions(t,b){ const s=app.settings, out=[]; const add=(id,label,note)=>out.push({id,label,note}); if(['tooBig','unclear'].includes(b)){add('tiny','Tiny first action','Do only the first physical step.');add('open','Open or gather first item','Open the file, page, bag or material.');add('list','Write one next step','Make the next action visible.');} if(['lowEnergy','timeShort'].includes(b)){add('minimum','Use minimum version','Do the minimum and count it.');add('stand','Stand up / move first','Use a small physical transition.');} if(b==='boring'){add('music','Add music','For chores or non-language work only.');add('location','Change location','Move somewhere with less friction.');} if(['emotional','needInfo'].includes(b)){add('draft','Draft only','Write but do not send yet.');add('ask','Ask one question','Get one missing piece.');} if(b==='phonePull'&&!s.avoidScrollingRewards){add('phoneAfter','Phone after action','Only after the minimum is done.');} if(b==='phonePull'){add('phoneAway','Phone away 10 minutes','Reduce competing cues.');} if(t.area==='Food'&&!s.avoidFoodRewards) add('easyFood','Choose easy food','Use a backup meal without making it a reward.'); if(t.area==='Movement') add('shoes','Shoes/clothes only','Prepare the first cue.'); if(t.area==='Work') add('oneLine','Write one line','Make first output tiny.'); return out.slice(0,8); }
  function chooseBoost(id,label){ const taskId=$('boostTaskId').value; const t=app.tasks.find(x=>x.id===taskId); if(!t) return; const row={id:uid(),taskId,taskTitle:displayTitle(t),label,result:null,date:new Date().toISOString()}; app.startBoostLog.unshift(row); if(id==='minimum') shrink(taskId); if(app.activeTimer&&app.activeTimer.taskId===taskId) app.activeTimer.boost=row; $('boostModal').classList.remove('show'); save(); render(); toast(`Start Boost set: ${label}.`); }
  function openBoostFeedback(){ const b=app.boostFeedback; if(!b) return; const txt=$('boostFeedbackText'); if(txt) txt.textContent=`Start support: ${b.label} for ${b.taskTitle}.`; const m=$('boostFeedback'); if(m) m.classList.add('show'); }
  function recordBoostResult(result){ const b=app.boostFeedback || app.startBoostLog[0]; if(!b) return; b.result=result; const i=app.startBoostLog.findIndex(x=>x.id===b.id); if(i>=0) app.startBoostLog[i]=b; else app.startBoostLog.unshift(b); app.boostFeedback=null; save(); render(); toast(`Start Boost feedback saved: ${resultLabel(result)}.`); }
  function resultLabel(r){ return {yes:'helped',bit:'helped a bit',no:'not useful',harder:'made it harder',pending:'not rated'}[r]||r; }

  function saveSetup(){ const s=app.settings; ['wake','bed','breakfast','lunch','dinner','workStart','workEnd'].forEach(k=>s[k]=$(`set-${k}`).value); s.exerciseTarget=Number($('set-exerciseTarget').value)||0; s.workDays=[...document.querySelectorAll('[data-workday]:checked')].map(x=>x.dataset.workday); ['avoidFoodRewards','avoidShoppingRewards','avoidScrollingRewards','avoidUrgencyCountdowns','avoidAccountabilityPrompts','avoidStreakPressure'].forEach(k=>s[k]=$(`set-${k}`).checked); save(); render(); toast('Setup saved.'); }
  function exportJson(){ const blob=new Blob([JSON.stringify(app,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`life-rhythm-${VERSION}-backup.json`; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),500); }
  function importJson(file){ const r=new FileReader(); r.onload=()=>{ try{ app=migrate(JSON.parse(r.result)); save(); render(); toast('Import complete.'); } catch { toast('Import failed. JSON was not valid.'); } }; r.readAsText(file); }
  function updateClock(){ const n=new Date(); const a=$('clockNow'), b=$('clockBlock'); if(a) a.textContent=n.toLocaleString(undefined,{weekday:'short',hour:'numeric',minute:'2-digit'}); if(b) b.textContent=`${currentBlock()} · ${isWorkNow()?'work time':'not work time'}`; }

  function wire(){ if(wired) return; wired=true; document.addEventListener('click', onClick); document.addEventListener('change', onChange); }
  function rewire(){ /* persistent delegated handlers stay active across renders */ }
  function onClick(e){
    const q=s=>e.target.closest(s); try{
      if(q('[data-nav]')){ app.screen=q('[data-nav]').dataset.nav; save(); render(); return; }
      if(q('[data-state]')){ app.state=q('[data-state]').dataset.state; save(); render(); return; }
      if(q('[data-add-task]')){ openTask(); rewire(); return; }
      if(q('[data-save-task]')){ saveTask(); return; }
      if(q('[data-close-modal]')){ $('taskModal').classList.remove('show'); rewire(); return; }
      if(q('[data-complete]')){ completeTask(q('[data-complete]').dataset.complete,q('[data-complete]').dataset.mode); return; }
      if(q('[data-not-now]')){ notNow(q('[data-not-now]').dataset.notNow); return; }
      if(q('[data-shrink]')){ shrink(q('[data-shrink]').dataset.shrink); return; }
      if(q('[data-edit]')){ openTask(q('[data-edit]').dataset.edit); rewire(); return; }
      if(q('[data-delete]')){ const id=q('[data-delete]').dataset.delete; if(confirm('Delete this task?')){ app.tasks=app.tasks.filter(t=>t.id!==id); save(); render(); } return; }
      if(q('[data-too-much]')){ tooMuch('medium'); return; }
      if(q('[data-way-too-much]')){ tooMuch('high'); return; }
      if(q('[data-realistic]')){ toast('Marked realistic.'); rewire(); return; }
      if(q('[data-load-starters]')){ loadStarters(); return; }
      if(q('[data-pack]')){ addPack(q('[data-pack]').dataset.pack); return; }
      if(q('[data-shrink-active]')){ activeTasks().slice(0,3).forEach(t=>{if(!app.shrunk.includes(t.id)) app.shrunk.push(t.id)}); app.resetLog.unshift({date:todayISO(),text:'Shrank active tasks to minimum focus.'}); save(); render(); return; }
      if(q('[data-move-extras]')){ moveExtras(); return; }
      if(q('[data-one-action]')){ oneAction(); return; }
      if(q('[data-clear-today]')){ clearToday(); return; }
      if(q('[data-start-timer]')){ startTimer(q('[data-start-timer]').dataset.startTimer); return; }
      if(q('[data-pause-timer]')){ pauseTimer(); rewire(); return; }
      if(q('[data-cancel-timer]')){ cancelTimer(); return; }
      if(q('[data-finish-timer]')){ completeTask(q('[data-finish-timer]').dataset.finishTimer,q('[data-finish-timer]').dataset.mode); return; }
      if(q('[data-boost]')){ openBoost(q('[data-boost]').dataset.boost); rewire(); return; }
      if(q('[data-boost-barrier]')){ renderBoost(q('[data-boost-barrier]').dataset.boostBarrier); rewire(); return; }
      if(q('[data-boost-option]')){ chooseBoost(q('[data-boost-option]').dataset.boostOption,q('[data-boost-option]').dataset.boostLabel); return; }
      if(q('[data-close-boost]')){ $('boostModal').classList.remove('show'); rewire(); return; }
      if(q('[data-boost-result]')){ recordBoostResult(q('[data-boost-result]').dataset.boostResult); return; }
      if(q('[data-skip-boost-feedback]')){ app.boostFeedback=null; save(); render(); return; }
      if(q('[data-save-setup]')){ saveSetup(); return; }
      if(q('[data-export]')){ exportJson(); rewire(); return; }
      if(q('[data-import]')){ $('importFile').click(); rewire(); return; }
      if(q('[data-refresh]')){ render(); return; }
      if(q('.modalBack') && e.target.classList.contains('modalBack')){ e.target.classList.remove('show'); rewire(); return; }
    } finally { if(!$('app').innerHTML.includes('modalBack show')) rewire(); }
  }
  function onChange(e){ if(e.target && e.target.id === 'importFile' && e.target.files[0]) importJson(e.target.files[0]); rewire(); }

  render();
  if('serviceWorker' in navigator && location.protocol !== 'file:') window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));
})();
  </script>
</body>
</html>
